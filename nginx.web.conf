server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed build assets — cache hard (filenames change on each build).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA client-side routing — every unknown path serves the app shell.
  location / {
    try_files $uri /index.html;
  }

  # Never cache the HTML shell, so new deploys are picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
